name: Build NEWIFI-MINI Padavan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build NEWIFI-MINI firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      IMAGES_DIR: /opt/images

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y             automake             autopoint             bison             build-essential             cmake             cpio             curl             fakeroot             flex             gawk             gettext             gperf             help2man             kmod             libc-dev-bin             libgmp3-dev             libltdl-dev             libmpc-dev             libmpfr-dev             libncurses5-dev             libtool-bin             pkg-config             p7zip-full             python3-docutils             texinfo             unzip             wget             xxd             xz-utils             zlib1g-dev

      - name: Download MIPS toolchain
        shell: bash
        run: |
          set -euo pipefail
          cd toolchain-mipsel
          sh dl_toolchain.sh

      - name: Build NEWIFI-MINI firmware
        shell: bash
        run: |
          set -euo pipefail
          cd trunk
          mkdir -p "${IMAGES_DIR}"

          fakeroot ./build_firmware_ci NEWIFI-MINI

          shopt -s nullglob
          firmware_files=(images/*.trx)

          if [ "${#firmware_files[@]}" -ne 1 ]; then
            echo "Expected exactly one .trx firmware file; found ${#firmware_files[@]}."
            printf '%s\n' "${firmware_files[@]}"
            exit 1
          fi

          cp -f "${firmware_files[0]}" "${IMAGES_DIR}/NEWIFI-MINI.trx"
          ls -lh "${IMAGES_DIR}/NEWIFI-MINI.trx"

      - name: Package firmware and checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "${IMAGES_DIR}"

          GIT_VERSION="$(git -C "${GITHUB_WORKSPACE}" rev-parse --short=7 HEAD)"
          ARCHIVE_NAME="NEWIFI-MINI_${GIT_VERSION}.7z"

          md5sum NEWIFI-MINI.trx > md5sum.txt
          sha256sum NEWIFI-MINI.trx > sha256sum.txt
          7z a -mx=9 "${ARCHIVE_NAME}"             NEWIFI-MINI.trx             md5sum.txt             sha256sum.txt

          ls -lh "${ARCHIVE_NAME}"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEWIFI-MINI-Padavan
          path: ${{ env.IMAGES_DIR }}/*.7z
          if-no-files-found: error
          retention-days: 14
